# Custom patterns for secret detection
secret_patterns:
  - name: "Database Connection String"
    pattern: "mysql://[a-zA-Z0-9]+:[a-zA-Z0-9]+@[a-zA-Z0-9.-]+:[0-9]+/[a-zA-Z0-9_-]+"

  - name: "API Keys (Custom Format)"
    pattern: "api_[a-zA-Z0-9]{32}"

  - name: "Laravel APP_KEY Pattern"
    pattern: "base64:[A-Za-z0-9+/]{32,}={0,2}"
